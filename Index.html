<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTD CORP</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#161b26;--bg3:#1c2333;--card:#1e2535;--card2:#232c3d;--border:#2a3650;--border2:#344060;--accent:#e8a020;--accent2:#f0b93a;--accent-dim:rgba(232,160,32,0.15);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--purple:#a855f7;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-gold:0 0 30px rgba(232,160,32,0.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#login-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(232,160,32,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 30%,rgba(59,130,246,0.06) 0%,transparent 60%);}
.login-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,160,32,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,160,32,0.03) 1px,transparent 1px);background-size:60px 60px;}
.login-card{position:relative;z-index:10;background:var(--card);border:1px solid var(--border);padding:48px 40px;width:420px;box-shadow:var(--shadow),var(--shadow-gold);animation:slideUp 0.5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:36px;}
.login-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#b86010);display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:10px;box-shadow:0 4px 20px rgba(232,160,32,0.4);}
.login-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--accent);}
.login-logo-sub{font-size:12px;color:var(--text2);font-weight:300;}
.login-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.login-field{margin-bottom:20px;}
.login-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:block;}
.login-input{width:100%;padding:13px 16px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;border-radius:8px;outline:none;transition:all 0.2s;}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,160,32,0.15);}
.login-btn{width:100%;padding:14px;background:var(--accent);border:none;color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;border-radius:8px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.login-btn:hover{background:var(--accent2);box-shadow:0 4px 20px rgba(232,160,32,0.4);transform:translateY(-1px);}
.login-error{background:var(--red-dim);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:10px 14px;border-radius:6px;font-size:13px;margin-top:12px;display:none;}
.login-hint{text-align:center;font-size:12px;color:var(--text3);margin-top:24px;font-family:'DM Mono',monospace;}
#app{display:none;}
.topbar{height:64px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:20px;position:sticky;top:0;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:12px;border-right:1px solid var(--border);padding-right:20px;margin-right:4px;}
.topbar-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#b86010);display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:8px;}
.topbar-logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--accent);}
.topbar-sub{font-size:11px;color:var(--text2);}
.topbar-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.dot-green{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse-green 2s infinite;}
@keyframes pulse-green{0%,100%{opacity:1}50%{opacity:0.4}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.status-pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;}
.status-pill.online{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.user-badge{display:flex;align-items:center;gap:10px;padding:6px 14px 6px 6px;background:var(--card);border:1px solid var(--border);border-radius:24px;cursor:pointer;}
.user-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#b86010);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#000;}
.user-info{line-height:1.2;}
.user-name{font-size:13px;font-weight:600;}
.user-grade{font-size:11px;color:var(--accent);}
.logout-btn{width:36px;height:36px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.layout{display:flex;min-height:calc(100vh - 64px);}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s;color:var(--text2);font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,160,32,0.2);}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-section{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:2px;padding:12px 14px 4px;}
.content{flex:1;padding:28px;overflow-y:auto;}
.page{display:none;}
.page.active{display:block;}
.page-header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.card-body{padding:20px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.stat-card::after{content:attr(data-icon);position:absolute;right:16px;top:16px;font-size:28px;opacity:0.15;}
.stat-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;color:var(--accent);}
.stat-value.green{color:var(--green);}
.stat-value.blue{color:var(--blue);}
.stat-delta{font-size:12px;color:var(--text2);margin-top:6px;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr 320px;gap:20px;margin-top:24px;}
@media(max-width:1200px){.dash-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:800px){.dash-grid{grid-template-columns:1fr;}}
.top-emp-widget{text-align:center;padding:24px;}
.top-emp-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#b86010);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#000;margin:0 auto 12px;box-shadow:0 0 0 4px rgba(232,160,32,0.3);}
.top-emp-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.top-emp-grade{font-size:12px;color:var(--text2);margin-bottom:16px;}
.top-emp-stats{display:flex;justify-content:center;gap:24px;}
.tes{text-align:center;}
.tes-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);}
.tes-label{font-size:11px;color:var(--text2);margin-top:2px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(42,54,80,0.5);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.table-wrap{overflow-x:auto;}
.btn{padding:9px 18px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:var(--accent2);}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}... (28Korestants)
